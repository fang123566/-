  <style>
    /* ----------------------------------------------------------- */
    /* 核心布局与古风样式增强 (基于原框架) */
    /* ----------------------------------------------------------- */
    
    .sub-page-content {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        z-index: 5; /* 确保在纸张纹理之上 */
        position: relative;
    }

    /* 通用古风容器：水墨拉丝背景 + 阴影 */
    .section-card {
        background: rgba(253, 252, 248, 0.9); /* 宣纸色半透明 */
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        padding: 1.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: cardEntry 0.8s ease forwards;
    }

    @keyframes cardEntry {
        to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1rem;
        border-bottom: 1px solid #ccc;
        padding-bottom: 0.5rem;
    }

    .section-header h3 {
        font-family: 'Noto Serif SC', serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: #1a1a1a;
    }

    .section-header span {
        font-family: 'Ma Shan Zheng', cursive;
        color: #e74c3c; /* 朱砂色点缀 */
        font-size: 1rem;
    }

    /* ----------------------------------------------------------- */
    /* 上部：饼图与词云 并排 */
    /* ----------------------------------------------------------- */
    .top-row {
        display: flex;
        gap: 2rem;
        height: 400px;
    }

    #chartPieContainer, #wordCloudContainer {
        flex: 1;
        height: 100%;
        position: relative;
    }

    #wordCloudCanvas {
        width: 100%;
        height: 100%;
    }

    /* ----------------------------------------------------------- */
    /* 下部：横向滚动图片库 */
    /* ----------------------------------------------------------- */
    .gallery-card {
        padding: 1rem;
        /* 深色木纹边框模拟 */
        border: 4px solid #3e2723; 
        background: #efebe9;
    }

    .gallery-scroll-wrapper {
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
        padding: 1rem 0;
        /* 自定义滚动条样式 (Chrome/Safari) */
        scrollbar-width: thin;
        scrollbar-color: #5d4037 #efebe9;
    }

    .gallery-scroll-wrapper::-webkit-scrollbar {
        height: 8px;
    }
    .gallery-scroll-wrapper::-webkit-scrollbar-track {
        background: #efebe9;
    }
    .gallery-scroll-wrapper::-webkit-scrollbar-thumb {
        background: #5d4037;
        border-radius: 4px;
    }

    .gallery-item {
        display: inline-block;
        width: 300px;
        height: 220px;
        margin-right: 1.5rem;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        
        /* 默认浮雕/高亮过渡效果 */
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        border: 2px solid transparent;
    }

    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    /* 悬停放大效果 */
    .gallery-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    
    .gallery-item:hover img {
        transform: scale(1.1);
    }

    .item-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        color: white;
        padding: 15px 10px 5px 10px;
        font-family: 'Noto Serif SC', serif;
        text-align: center;
        transform: translateY(100%);
        transition: transform 0.3s ease;
    }

    .gallery-item:hover .item-caption {
        transform: translateY(0);
    }

    /* ----------------------------------------------------------- */
    /* 交互效果类 (JS触发) */
    /* ----------------------------------------------------------- */
    
    /* 词云悬停时的图片高亮（朱砂红呼吸灯 + 浮雕） */
    .gallery-item.hl-from-cloud {
        border-color: #e74c3c;
        transform: scale(1.05) translateY(-5px);
        box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
        animation: hlPulse 1.5s infinite;
        z-index: 10;
    }

    @keyframes hlPulse {
        0% { box-shadow: 0 0 15px rgba(231, 76, 60, 0.6); }
        50% { box-shadow: 0 0 25px rgba(231, 76, 60, 0.9); }
        100% { box-shadow: 0 0 15px rgba(231, 76, 60, 0.6); }
    }

  </style>

  <script src="app.js"></script>
  
  <script>
    // -----------------------------------------------------------
    // 模拟数据与交互逻辑
    // -----------------------------------------------------------

    // 1. 题材与图片库锚点映射 (用于饼图点击筛选)
    const categoryAnchors = {
        '【待填充A】': 'gallery-catA-1',
        '【待填充B】': 'gallery-catB-1',
        '【待填充C】': 'gallery-catC-1'
    };

    // 2. 词云关键词数据 (含大小和传统色映射)
    const wordFreq = [
        { text: "【待填充Key1】", size: 50, color: "#1a1a1a" }, // 墨色
        { text: "【待填充Key2】", size: 40, color: "#e74c3c" }, // 朱砂
        { text: "【待填充Key3】", size: 30, color: "#3498db" }, // 石青
        { text: "【待填充Key4】", size: 25, color: "#f1c40f" }  // 藤黄
    ];

    document.addEventListener('DOMContentLoaded', () => {
        initPieChart();
        initWordCloud();
    });

    // -----------------------------------------------------------
    // ECharts 饼图初始化
    // -----------------------------------------------------------
    function initPieChart() {
        const chartDom = document.getElementById('chartPie');
        const myChart = echarts.init(chartDom);
        
        const option = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'item', formatter: '{b}: {d}%' },
            legend: { top: 'bottom', textStyle: { fontFamily: 'Noto Serif SC' } },
            series: [{
                name: '【待填充】题材',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: false, position: 'center' },
                emphasis: { label: { show: true, fontSize: '18', fontWeight: 'bold' } },
                labelLine: { show: false },
                // 对应映射数据
                data: [
                    { value: 40, name: '【待填充A】', itemStyle: {color: '#5d4037'} },
                    { value: 30, name: '【待填充B】', itemStyle: {color: '#8d6e63'} },
                    { value: 30, name: '【待填充C】', itemStyle: {color: '#bcaaa4'} }
                ]
            }]
        };

        myChart.setOption(option);

        // --- 交互：饼图点击筛选图片 ---
        myChart.on('click', function(params) {
            const categoryName = params.name;
            const anchorId = categoryAnchors[categoryName];
            if (anchorId) {
                const targetItem = document.getElementById(anchorId);
                const wrapper = document.getElementById('galleryWrapper');
                if (targetItem && wrapper) {
                    // 平滑滚动到目标图片位置
                    wrapper.scrollTo({
                        left: targetItem.offsetLeft - wrapper.offsetLeft,
                        behavior: 'smooth'
                    });
                    
                    // 可选：给目标添加临时的闪烁效果以示强调
                    targetItem.style.animation = 'hlPulse 0.5s 2';
                    setTimeout(() => targetItem.style.animation = '', 1000);
                }
            }
        });

        window.addEventListener('resize', myChart.resize);
    }

    // -----------------------------------------------------------
    // d3-cloud 古风词云初始化
    // -----------------------------------------------------------
    function initWordCloud() {
        const container = document.getElementById('wordCloudCanvas');
        const width = container.offsetWidth;
        const height = container.offsetHeight;

        // 清空容器（防止resize重复绘制）
        d3.select("#wordCloudCanvas").selectAll("*").remove();

        const layout = d3.layout.cloud()
            .size([width, height])
            .words(wordFreq.map(d => ({text: d.text, size: d.size, color: d.color})))
            .padding(5)
            .rotate(() => (~~(Math.random() * 2) * 90) * 0.5) // 随机倾斜0或45度
            .font("Ma Shan Zheng")
            .fontSize(d => d.size)
            .on("end", draw);

        layout.start();

        function draw(words) {
            const svg = d3.select("#wordCloudCanvas").append("svg")
                .attr("width", layout.size()[0])
                .attr("height", layout.size()[1])
                .append("g")
                .attr("transform", "translate(" + layout.size()[0] / 2 + "," + layout.size()[1] / 2 + ")");

            svg.selectAll("text")
                .data(words)
                .enter().append("text")
                .style("font-size", d => d.size + "px")
                .style("font-family", "Ma Shan Zheng")
                .style("fill", d => d.color) // 使用指定的古风色
                .attr("text-anchor", "middle")
                .attr("transform", d => "translate(" + [d.x, d.y] + ")rotate(" + d.rotate + ")")
                .text(d => d.text)
                .style("cursor", "pointer")
                
                // 入场动画：从小到大渐变
                .style("opacity", 0)
                .transition().duration(1000).style("opacity", 1)

                // --- 交互：词云悬停高亮对应图片 ---
                .on("mouseover", function(event, d) {
                    const hoveredWord = d.text;
                    const galleryItems = document.querySelectorAll('.gallery-item');
                    
                    galleryItems.forEach(item => {
                        const tags = item.getAttribute('data-tags');
                        if (tags && tags.includes(hoveredWord)) {
                            // 添加 CSS 高亮类
                            item.classList.add('hl-from-cloud');
                        } else {
                            // 其他图片稍微变暗以突出高亮项
                            item.style.opacity = 0.5;
                        }
                    });
                    
                    // 放大自身词汇
                    d3.select(this).transition().duration(200).style("font-size", (d.size * 1.2) + "px");
                })
                .on("mouseout", function(event, d) {
                    // 移除高亮和恢复透明度
                    document.querySelectorAll('.gallery-item').forEach(item => {
                        item.classList.remove('hl-from-cloud');
                        item.style.opacity = 1;
                    });
                    
                    // 还原自身词汇大小
                    d3.select(this).transition().duration(200).style("font-size", d.size + "px");
                });
        }
    }

  </script>

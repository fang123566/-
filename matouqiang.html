<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马头墙 | 解码徽派民居</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  
  <style>
    /* ================= 新增：马头墙内容区专属样式 ================= */
    .content-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        position: relative;
        z-index: 2; /* 确保在背景视频/纸张之上 */
    }

    .section-title {
        text-align: center;
        font-size: 1.8rem;
        margin-bottom: 2rem;
        color: #2c3e50;
        position: relative;
        font-family: 'Noto Serif SC', serif;
    }

    .section-title::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        background-color: #2c3e50;
        margin: 10px auto 0;
    }

    /* 剖面图交互区 */
    .profile-section {
        background: rgba(255, 255, 255, 0.85);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 3rem;
        backdrop-filter: blur(8px); /* 毛玻璃效果透出背景 */
    }

    .image-wrapper {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
    }

    .image-wrapper img {
        width: 100%;
        display: block;
        transition: transform 0.5s ease;
    }

    /* 呼吸灯热点 */
    .hotspot {
        position: absolute;
        width: 24px;
        height: 24px;
        background-color: #e74c3c;
        border: 3px solid white;
        border-radius: 50%;
        cursor: pointer;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        animation: pulse 2s infinite;
        z-index: 10;
    }

    .hotspot:hover {
        background-color: #c0392b;
        transform: translate(-50%, -50%) scale(1.2);
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
        100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    /* 知识卡片弹出层 */
    .info-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        background: rgba(255, 255, 255, 0.95);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        width: 80%;
        max-width: 400px;
        z-index: 20;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid #eee;
    }

    .info-card.active {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 1.5rem;
        cursor: pointer;
        color: #7f8c8d;
        transition: color 0.3s;
    }

    .close-btn:hover { color: #e74c3c; }
    .info-card h3 { 
        margin-bottom: 1rem; 
        color: #2c3e50; 
        border-bottom: 2px solid #eee; 
        padding-bottom: 0.5rem; 
        font-family: 'Noto Serif SC', serif;
    }

    /* 图表区 */
    .charts-section {
        display: flex;
        gap: 2rem;
        margin-bottom: 3rem;
        flex-wrap: wrap;
    }

    .chart-card {
        flex: 1;
        min-width: 300px;
        background: rgba(255, 255, 255, 0.85);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        backdrop-filter: blur(8px);
        transition: transform 0.3s;
    }

    .chart-card:hover { transform: translateY(-5px); }
    .chart-container { width: 100%; height: 350px; }
    
    .filter-hint {
        text-align: center;
        font-size: 0.9rem;
        color: #7f8c8d;
        margin-top: 1rem;
    }

    /* 图片展示区 */
    .gallery-section {
        background: rgba(255, 255, 255, 0.85);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        backdrop-filter: blur(8px);
    }

    .gallery-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .reset-btn {
        padding: 8px 16px;
        background-color: #2c3e50;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.3s;
        font-family: 'Noto Serif SC', serif;
    }

    .reset-btn:hover { background-color: #1a252f; }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.5rem;
    }

    .gallery-item {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .gallery-item.hidden {
        display: none;
        opacity: 0;
        transform: scale(0.8);
    }

    .gallery-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
        transform: scale(1.1);
    }

    .gallery-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        text-align: center;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        font-family: 'Noto Serif SC', serif;
    }

    .gallery-item:hover .gallery-caption {
        transform: translateY(0);
    }
  </style>
</head>

  <section class="page sub-page">

                <div class="hotspot" style="top: 70%; left: 80%;" onclick="openCard('【待填充部位3】', '【待填充部位3知识详情，如：小青瓦...】')"></div>

            <div class="chart-card">

  <script src="app.js"></script>
  
  <script>
      // 剖面图卡片交互
      function openCard(title, content) {
          document.getElementById('cardTitle').innerText = title;
          document.getElementById('cardContent').innerText = content;
          document.getElementById('infoCard').classList.add('active');
      }

      function closeCard() {
          document.getElementById('infoCard').classList.remove('active');
      }

      // 图片库筛选映射
      const categoryMap = {
          '【图例1：三阶】': 'typeA',
          '【图例2：四阶】': 'typeB',
          '【图例3：五阶】': 'typeC'
      };

      function filterGallery(categoryKey) {
          const items = document.querySelectorAll('.gallery-item');
          const filterText = document.getElementById('currentFilter');
          
          items.forEach(item => {
              if (categoryKey === 'all' || item.getAttribute('data-category') === categoryMap[categoryKey]) {
                  item.classList.remove('hidden');
                  void item.offsetWidth;
                  item.style.display = 'block';
                  setTimeout(() => { item.style.opacity = '1'; item.style.transform = 'scale(1)'; }, 50);
              } else {
                  item.style.opacity = '0';
                  item.style.transform = 'scale(0.8)';
                  setTimeout(() => { item.classList.add('hidden'); item.style.display = 'none'; }, 300);
              }
          });

          filterText.innerText = categoryKey === 'all' ? '' : `(已筛选: ${categoryKey})`;
      }

      // 图表初始化（确保在DOM加载完成后执行）
      document.addEventListener('DOMContentLoaded', function() {
          // 初始化柱状图
          var barChart = echarts.init(document.getElementById('barChart'));
          var barOption = {
              tooltip: { trigger: 'axis' },
              xAxis: {
                  type: 'category',
                  data: ['【高度范围A】', '【高度范围B】', '【高度范围C】', '【高度范围D】']
              },
              yAxis: { type: 'value', name: '【数量/建筑数】' },
              series: [{
                  data: [120, 200, 150, 80],
                  type: 'bar',
                  itemStyle: { color: '#2c3e50', borderRadius: [5, 5, 0, 0] },
                  animationDuration: 1500,
                  animationEasing: 'cubicOut'
              }]
          };
          barChart.setOption(barOption);

          // 初始化饼图
          var pieChart = echarts.init(document.getElementById('pieChart'));
          var pieOption = {
              tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
              legend: { bottom: '0%', left: 'center' },
              series: [{
                  name: '【层数分布】',
                  type: 'pie',
                  radius: ['40%', '70%'],
                  avoidLabelOverlap: false,
                  itemStyle: {
                      borderRadius: 10,
                      borderColor: '#fff',
                      borderWidth: 2
                  },
                  label: { show: false, position: 'center' },
                  emphasis: {
                      label: { show: true, fontSize: '18', fontWeight: 'bold' }
                  },
                  labelLine: { show: false },
                  data: [
                      { value: 1048, name: '【图例1：三阶】', itemStyle: { color: '#34495e' } },
                      { value: 735, name: '【图例2：四阶】', itemStyle: { color: '#7f8c8d' } },
                      { value: 580, name: '【图例3：五阶】', itemStyle: { color: '#95a5a6' } }
                  ],
                  animationType: 'scale',
                  animationEasing: 'elasticOut',
                  animationDelay: function (idx) { return Math.random() * 200; }
              }]
          };
          pieChart.setOption(pieOption);

          // 饼图点击事件绑定 -> 触发图库筛选
          pieChart.on('click', function(params) {
              filterGallery(params.name);
          });

          // 监听窗口大小变化
          window.addEventListener('resize', function() {
              barChart.resize();
              pieChart.resize();
          });
      });
  </script>
